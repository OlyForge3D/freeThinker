name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck \
            install.sh \
            uninstall.sh \
            update.sh \
            installer/lib/common.sh \
            installer/steps/*.sh

  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: |
          ruff check \
            klipper-eryone \
            moonraker-eryone \
            klipperscreen-eryone
